<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kashemir Beauty Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --studio-green: #3a703b; --studio-gold: #c5a880; }
        body.day-theme { --bg-color: #faf5ed; --text-main: #1a1a1a; --text-title: #3a703b; --nav-bg: rgba(250, 245, 237, 0.95); }
        body.night-theme { --bg-color: #112212; --text-main: #faf5ed; --text-title: #c5a880; --nav-bg: rgba(17, 34, 18, 0.95); }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding-bottom: 120px; transition: 0.5s; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .splash-logo { width: 200px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        header { text-align: center; padding: 40px 0; }
        .main-logo { width: 200px; }

        .container { width: 90%; max-width: 600px; margin: auto; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .menu-card { background: rgba(255,255,255,0.05); border: 1px solid var(--studio-gold); border-radius: 20px; padding: 15px; text-align: center; transition: 0.3s; }
        .menu-card.dimmed { opacity: 0.2; filter: grayscale(1); }
        .img-wrapper img { width: 100%; height: 120px; object-fit: cover; border-radius: 15px; }

        .mood-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--nav-bg); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 50px; display: flex; gap: 10px; z-index: 900; border: 1px solid var(--studio-gold); }
        .mood-btn { background: none; border: none; color: var(--text-main); font-size: 0.8rem; cursor: pointer; padding: 5px 10px; }
        .mood-btn.active { color: var(--studio-gold); font-weight: bold; }

        #successOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 10000; display: none; flex-direction: column; overflow-y: auto; padding: 20px; }
        #cinematic-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .success-box { position: relative; z-index: 1; text-align: center; padding-top: 50px; color: var(--text-main); }
        
        #conciergeCallBtn { position: fixed; bottom: 30px; right: 20px; z-index: 850; background: var(--studio-gold); border-radius: 50%; width: 55px; height: 55px; border: none; color: white; transition: 0.3s; }
        #conciergeCallBtn.shifted { bottom: 90px; }
        
        #usualOrderBanner { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: 90%; background: var(--nav-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--studio-gold); z-index: 900; transition: 0.5s; }
    </style>
</head>
<body>

<div id="splash-screen"><img src="https://i.postimg.cc/tJCcCrMc/Qaqa.png" class="splash-logo"></div>

<header>
    <div id="dynamic-greeting"></div>
    <img src="https://i.postimg.cc/vHjbR9Tm/Bez-fona-cvetnoj-vertikal'nyj-1.png" class="main-logo">
</header>

<div class="container">
    <div class="menu-grid" id="menuGrid">
        <div class="menu-card" data-mood="energy"><img src="https://i.postimg.cc/CMcwN9VZ/IMG-0847.jpg"><h3>Латте</h3><button onclick="order('Латте')">ЗАКАЗАТЬ</button></div>
        <div class="menu-card" data-mood="relax"><img src="https://i.postimg.cc/CMcwN9VG/IMG-0852.jpg"><h3>Чай</h3><button onclick="order('Чай')">ЗАКАЗАТЬ</button></div>
        <div class="menu-card" data-mood="cool"><img src="https://i.postimg.cc/MT0D2WP4/IMG-0923.png"><h3>Мохито</h3><button onclick="order('Мохито')">ЗАКАЗАТЬ</button></div>
    </div>
</div>

<div class="mood-bar">
    <button class="mood-btn active" onclick="setMood('all', this)">Все</button>
    <button class="mood-btn" onclick="setMood('relax', this)">Релакс</button>
    <button class="mood-btn" onclick="setMood('energy', this)">Энергия</button>
    <button class="mood-btn" onclick="setMood('cool', this)">Прохлада</button>
</div>

<button id="conciergeCallBtn" onclick="alert('Администратор скоро будет!')">🛎️</button>
<div id="usualOrderBanner">Повторить заказ? <button onclick="alert('Заказ отправлен!')">ДА</button></div>

<div id="successOverlay">
    <canvas id="cinematic-canvas"></canvas>
    <div class="success-box">
        <img src="https://i.postimg.cc/vHjbR9Tm/Bez-fona-cvetnoj-vertikal'nyj-1.png" style="width:150px">
        <h1>Ваш напиток готовится</h1>
        <button onclick="document.getElementById('successOverlay').style.display='none'">Вернуться</button>
    </div>
</div>

<script>
    // إغلاق إجباري لشاشة البداية بعد 3 ثوانٍ
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.style.display = 'none', 1000); }
        }, 3000);
    });

    const hour = new Date().getHours();
    document.body.className = (hour >= 6 && hour < 18) ? 'day-theme' : 'night-theme';
    
    function setMood(mood, btn) {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.menu-card').forEach(card => {
            card.classList.toggle('dimmed', mood !== 'all' && card.dataset.mood !== mood);
        });
    }

    function order(item) {
        document.getElementById('successOverlay').style.display = 'flex';
        initParticles();
        document.getElementById('conciergeCallBtn').classList.add('shifted');
        setTimeout(() => document.getElementById('usualOrderBanner').style.bottom = '20px', 1000);
    }

    function initParticles() {
        const canvas = document.getElementById('cinematic-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = Array.from({length: 30}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2}));
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#c5a880';
            particles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill(); p.y -= 0.5; if(p.y < 0) p.y = canvas.height; });
            requestAnimationFrame(animate);
        }
        animate();
    }
</script>
</body>
</html>
